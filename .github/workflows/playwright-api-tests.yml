name: Playwright API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_env: [dev, qa, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run Module 5 CI-focused tests
        env:
          TARGET_ENV: ${{ matrix.target_env }}
        run: |
          npx playwright test modules/Module 5 - Data Driven and DevOps/cicd.github-actions.integration.test.js modules/Module 5 - Data Driven and DevOps/environment.management.dev.qa.prod.test.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.target_env }}
          path: playwright-report/
          if-no-files-found: ignore
